<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e8f4fd; stroke: #1976d2; stroke-width: 2; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 1.5; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 2; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 2; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #333; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="450" y="30" class="title">A级景区信息管理模块 ER图</text>
  
  <!-- 管理员实体 -->
  <rect x="50" y="100" width="120" height="60" class="entity" rx="5"/>
  <text x="110" y="130" class="text">管理员</text>
  
  <!-- 管理员属性 -->
  <ellipse cx="30" cy="80" rx="25" ry="15" class="key-attribute"/>
  <text x="30" y="80" class="text" font-size="10">user_id</text>
  
  <ellipse cx="110" cy="60" rx="30" ry="15" class="attribute"/>
  <text x="110" y="60" class="text" font-size="10">用户名</text>
  
  <ellipse cx="190" cy="80" rx="25" ry="15" class="attribute"/>
  <text x="190" y="80" class="text" font-size="10">姓名</text>
  
  <!-- A级景区实体 -->
  <rect x="350" y="250" width="200" height="100" class="entity" rx="5"/>
  <text x="450" y="290" class="text">A级景区</text>
  <text x="450" y="310" class="text" font-size="10">(tourism_scenic_spot)</text>
  
  <!-- A级景区主要属性 -->
  <ellipse cx="280" cy="200" rx="20" ry="15" class="key-attribute"/>
  <text x="280" y="200" class="text" font-size="10">id</text>
  
  <ellipse cx="350" cy="180" rx="30" ry="15" class="attribute"/>
  <text x="350" y="180" class="text" font-size="10">name</text>
  
  <ellipse cx="450" cy="160" rx="25" ry="15" class="attribute"/>
  <text x="450" y="160" class="text" font-size="10">level</text>
  
  <ellipse cx="550" cy="180" rx="40" ry="15" class="attribute"/>
  <text x="550" y="180" class="text" font-size="10">cover_image</text>
  
  <ellipse cx="620" cy="200" rx="35" ry="15" class="attribute"/>
  <text x="620" y="200" class="text" font-size="10">image_urls</text>
  
  <!-- 位置相关属性 -->
  <ellipse cx="200" cy="250" rx="30" ry="15" class="attribute"/>
  <text x="200" y="250" class="text" font-size="10">address</text>
  
  <ellipse cx="200" cy="290" rx="25" ry="15" class="attribute"/>
  <text x="200" y="290" class="text" font-size="10">city</text>
  
  <ellipse cx="200" cy="330" rx="25" ry="15" class="attribute"/>
  <text x="200" y="330" class="text" font-size="10">district</text>
  
  <ellipse cx="200" cy="370" rx="30" ry="15" class="attribute"/>
  <text x="200" y="370" class="text" font-size="10">longitude</text>
  
  <ellipse cx="280" cy="400" rx="25" ry="15" class="attribute"/>
  <text x="280" y="400" class="text" font-size="10">latitude</text>
  
  <!-- 业务相关属性 -->
  <ellipse cx="650" cy="250" rx="35" ry="15" class="attribute"/>
  <text x="650" y="250" class="text" font-size="10">ticket_price</text>
  
  <ellipse cx="650" cy="290" rx="40" ry="15" class="attribute"/>
  <text x="650" y="290" class="text" font-size="10">opening_hours</text>
  
  <ellipse cx="650" cy="330" rx="40" ry="15" class="attribute"/>
  <text x="650" y="330" class="text" font-size="10">contact_phone</text>
  
  <ellipse cx="650" cy="370" rx="30" ry="15" class="attribute"/>
  <text x="650" y="370" class="text" font-size="10">website</text>
  
  <ellipse cx="450" cy="400" rx="35" ry="15" class="attribute"/>
  <text x="450" y="400" class="text" font-size="10">description</text>
  
  <!-- 统计相关属性 -->
  <ellipse cx="350" cy="420" rx="40" ry="15" class="attribute"/>
  <text x="350" y="420" class="text" font-size="10">collection_count</text>
  
  <ellipse cx="550" cy="420" rx="35" ry="15" class="attribute"/>
  <text x="550" y="420" class="text" font-size="10">view_count</text>
  
  <!-- 系统字段属性 -->
  <ellipse cx="620" cy="400" rx="25" ry="15" class="attribute"/>
  <text x="620" y="400" class="text" font-size="10">status</text>
  
  <ellipse cx="280" cy="450" rx="30" ry="15" class="attribute"/>
  <text x="280" y="450" class="text" font-size="10">create_by</text>
  
  <ellipse cx="380" cy="450" rx="35" ry="15" class="attribute"/>
  <text x="380" y="450" class="text" font-size="10">create_time</text>
  
  <ellipse cx="520" cy="450" rx="30" ry="15" class="attribute"/>
  <text x="520" y="450" class="text" font-size="10">update_by</text>
  
  <ellipse cx="620" cy="450" rx="35" ry="15" class="attribute"/>
  <text x="620" y="450" class="text" font-size="10">update_time</text>
  
  <!-- 用户实体 -->
  <rect x="700" y="500" width="120" height="60" class="entity" rx="5"/>
  <text x="760" y="530" class="text">用户</text>
  
  <!-- 用户属性 -->
  <ellipse cx="680" cy="480" rx="25" ry="15" class="key-attribute"/>
  <text x="680" y="480" class="text" font-size="10">user_id</text>
  
  <ellipse cx="760" cy="460" rx="30" ry="15" class="attribute"/>
  <text x="760" y="460" class="text" font-size="10">用户名</text>
  
  <ellipse cx="840" cy="480" rx="25" ry="15" class="attribute"/>
  <text x="840" y="480" class="text" font-size="10">昵称</text>
  
  <!-- 管理关系 -->
  <polygon points="170,130 280,200 260,190 280,210" class="relationship"/>
  <text x="225" y="165" class="text">管理</text>
  
  <!-- 浏览关系 -->
  <polygon points="550,300 700,500 680,490 700,510" class="relationship"/>
  <text x="625" y="400" class="text">浏览</text>
  
  <!-- 收藏关系 -->
  <polygon points="550,320 700,520 680,510 700,530" class="relationship"/>
  <text x="625" y="420" class="text">收藏</text>
  
  <!-- 连接线 -->
  <!-- 管理员到管理关系 -->
  <line x1="170" y1="130" x2="225" y2="165" class="line"/>
  
  <!-- 管理关系到景区 -->
  <line x1="225" y1="165" x2="350" y2="250" class="line"/>
  
  <!-- 用户到浏览关系 -->
  <line x1="700" y1="530" x2="625" y2="400" class="line"/>
  
  <!-- 浏览关系到景区 -->
  <line x1="625" y1="400" x2="550" y2="300" class="line"/>
  
  <!-- 用户到收藏关系 -->
  <line x1="700" y1="530" x2="625" y2="420" class="line"/>
  
  <!-- 收藏关系到景区 -->
  <line x1="625" y1="420" x2="550" y2="320" class="line"/>
  
  <!-- 属性连接线 -->
  <!-- 管理员属性 -->
  <line x1="55" y1="80" x2="80" y2="110" class="line"/>
  <line x1="110" y1="75" x2="110" y2="100" class="line"/>
  <line x1="165" y1="80" x2="140" y2="110" class="line"/>
  
  <!-- 景区属性连接 -->
  <line x1="300" y1="200" x2="350" y2="250" class="line"/>
  <line x1="350" y1="195" x2="380" y2="250" class="line"/>
  <line x1="450" y1="175" x2="450" y2="250" class="line"/>
  <line x1="550" y1="195" x2="520" y2="250" class="line"/>
  <line x1="600" y1="200" x2="550" y2="250" class="line"/>
  
  <!-- 位置属性连接 -->
  <line x1="230" y1="250" x2="350" y2="270" class="line"/>
  <line x1="225" y1="290" x2="350" y2="290" class="line"/>
  <line x1="225" y1="330" x2="350" y2="310" class="line"/>
  <line x1="230" y1="370" x2="350" y2="330" class="line"/>
  <line x1="305" y1="400" x2="350" y2="350" class="line"/>
  
  <!-- 业务属性连接 -->
  <line x1="615" y1="250" x2="550" y2="270" class="line"/>
  <line x1="610" y1="290" x2="550" y2="290" class="line"/>
  <line x1="610" y1="330" x2="550" y2="310" class="line"/>
  <line x1="620" y1="370" x2="550" y2="330" class="line"/>
  <line x1="450" y1="385" x2="450" y2="350" class="line"/>
  
  <!-- 统计属性连接 -->
  <line x1="350" y1="405" x2="380" y2="350" class="line"/>
  <line x1="550" y1="405" x2="520" y2="350" class="line"/>
  <line x1="595" y1="400" x2="550" y2="350" class="line"/>
  
  <!-- 系统字段连接 -->
  <line x1="305" y1="450" x2="380" y2="350" class="line"/>
  <line x1="380" y1="435" x2="420" y2="350" class="line"/>
  <line x1="495" y1="450" x2="480" y2="350" class="line"/>
  <line x1="620" y1="435" x2="520" y2="350" class="line"/>
  
  <!-- 用户属性 -->
  <line x1="705" y1="480" x2="730" y2="510" class="line"/>
  <line x1="760" y1="475" x2="760" y2="500" class="line"/>
  <line x1="815" y1="480" x2="790" y2="510" class="line"/>
  
  <!-- 基数标注 -->
  <text x="180" y="140" class="text" font-size="10">1</text>
  <text x="330" y="240" class="text" font-size="10">N</text>
  <text x="690" y="510" class="text" font-size="10">N</text>
  <text x="560" y="310" class="text" font-size="10">1</text>
  <text x="690" y="530" class="text" font-size="10">N</text>
  <text x="560" y="330" class="text" font-size="10">1</text>
  
  <!-- 图例 -->
  <rect x="50" y="600" width="800" height="80" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="615" class="text" font-weight="bold">图例：</text>
  
  <rect x="70" y="625" width="40" height="20" class="entity" rx="2"/>
  <text x="90" y="635" class="text" font-size="10">实体</text>
  
  <ellipse cx="150" cy="635" rx="20" ry="10" class="key-attribute"/>
  <text x="150" y="635" class="text" font-size="9">主键属性</text>
  
  <ellipse cx="230" cy="635" rx="20" ry="10" class="attribute"/>
  <text x="230" y="635" class="text" font-size="9">普通属性</text>
  
  <polygon points="300,625 320,635 300,645 280,635" class="relationship"/>
  <text x="300" y="635" class="text" font-size="9">关系</text>
  
  <text x="60" y="660" class="text" font-size="10">说明：管理员可以管理多个景区信息；用户可以浏览和收藏多个景区；</text>
  <text x="60" y="675" class="text" font-size="10">景区包含基本信息、位置信息、业务信息、统计信息和系统管理字段。</text>
</svg>