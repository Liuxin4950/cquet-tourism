<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e3f2fd; stroke: #1976d2; stroke-width: 3; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 3; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 3; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 13px; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #1976d2; }
      .subtitle { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 11px; text-anchor: middle; dominant-baseline: middle; fill: #666; }
      .line { stroke: #333; stroke-width: 2; fill: none; }
      .foreign-key { stroke: #d32f2f; stroke-width: 3; stroke-dasharray: 5,5; }
      .cardinality { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #d32f2f; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="500" y="30" class="title">新闻管理模块 E-R图</text>
  
  <!-- 系统用户实体 -->
  <rect x="100" y="120" width="160" height="80" class="entity" rx="8"/>
  <text x="180" y="150" class="text" font-weight="bold">系统用户</text>
  <text x="180" y="170" class="subtitle">(sys_user)</text>
  
  <!-- 用户主键属性 -->
  <ellipse cx="60" cy="140" rx="30" ry="18" class="key-attribute"/>
  <text x="60" y="140" class="text" font-size="11">user_id (PK)</text>
  
  <!-- 用户普通属性 -->
  <ellipse cx="180" cy="80" rx="35" ry="18" class="attribute"/>
  <text x="180" y="80" class="text" font-size="11">user_name</text>
  
  <ellipse cx="300" cy="140" rx="30" ry="18" class="attribute"/>
  <text x="300" y="140" class="text" font-size="11">nick_name</text>
  
  <ellipse cx="180" cy="240" rx="25" ry="18" class="attribute"/>
  <text x="180" y="240" class="text" font-size="11">email</text>
  
  <!-- 新闻实体 -->
  <rect x="600" y="300" width="200" height="100" class="entity" rx="8"/>
  <text x="700" y="335" class="text" font-weight="bold">新闻信息</text>
  <text x="700" y="355" class="subtitle">(tourism_news)</text>
  
  <!-- 新闻主键属性 -->
  <ellipse cx="530" cy="320" rx="25" ry="18" class="key-attribute"/>
  <text x="530" y="320" class="text" font-size="11">id (PK)</text>
  
  <!-- 新闻普通属性 -->
  <ellipse cx="650" cy="250" rx="30" ry="18" class="attribute"/>
  <text x="650" y="250" class="text" font-size="11">title</text>
  
  <ellipse cx="750" cy="250" rx="35" ry="18" class="attribute"/>
  <text x="750" y="250" class="text" font-size="11">content</text>
  
  <ellipse cx="850" cy="320" rx="30" ry="18" class="attribute"/>
  <text x="850" y="320" class="text" font-size="11">author</text>
  
  <ellipse cx="650" cy="450" rx="35" ry="18" class="attribute"/>
  <text x="650" y="450" class="text" font-size="11">create_time</text>
  
  <ellipse cx="750" cy="450" rx="30" ry="18" class="attribute"/>
  <text x="750" y="450" class="text" font-size="11">status</text>
  
  <!-- 外键属性 -->
  <ellipse cx="530" cy="380" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="530" y="380" class="text" font-size="11" fill="#d32f2f">create_by (FK)</text>
  
  <ellipse cx="850" cy="380" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="850" y="380" class="text" font-size="11" fill="#d32f2f">update_by (FK)</text>
  
  <!-- 管理关系 -->
  <polygon points="400,200 450,225 400,250 350,225" class="relationship"/>
  <text x="400" y="225" class="text" font-weight="bold">管理</text>
  
  <!-- 连接线 -->
  <!-- 用户到关系 -->
  <line x1="260" y1="160" x2="350" y2="225" class="line"/>
  <!-- 关系到新闻 -->
  <line x1="450" y1="225" x2="600" y2="350" class="line"/>
  
  <!-- 外键连接线 -->
  <line x1="260" y1="180" x2="530" y2="380" class="foreign-key"/>
  <line x1="260" y1="180" x2="850" y2="380" class="foreign-key"/>
  
  <!-- 基数标注 -->
  <text x="280" y="170" class="cardinality">1</text>
  <text x="580" y="330" class="cardinality">N</text>
  
  <!-- 属性连接线 -->
  <line x1="90" y1="140" x2="100" y2="160" class="line"/>
  <line x1="180" y1="98" x2="180" y2="120" class="line"/>
  <line x1="280" y1="150" x2="260" y2="160" class="line"/>
  <line x1="180" y1="222" x2="180" y2="200" class="line"/>
  
  <line x1="555" y1="320" x2="600" y2="340" class="line"/>
  <line x1="650" y1="268" x2="650" y2="300" class="line"/>
  <line x1="750" y1="268" x2="750" y2="300" class="line"/>
  <line x1="830" y1="330" x2="800" y2="340" class="line"/>
  <line x1="650" y1="432" x2="650" y2="400" class="line"/>
  <line x1="750" y1="432" x2="750" y2="400" class="line"/>
  
  <!-- 说明文字 -->
  <rect x="50" y="520" width="900" height="120" fill="none" stroke="#ccc" stroke-width="2"/>
  <text x="500" y="545" class="text" font-weight="bold">关系说明</text>
  <text x="100" y="570" class="text" font-size="12">1. 系统用户(管理员)可以管理多个新闻信息 (1:N)</text>
  <text x="100" y="590" class="text" font-size="12">2. create_by 和 update_by 字段关联到 sys_user.user_name</text>
  <text x="100" y="610" class="text" font-size="12">3. 红色虚线表示外键关联关系</text>
</svg>
