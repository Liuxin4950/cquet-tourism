<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e8f4fd; stroke: #1976d2; stroke-width: 2; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 1.5; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 2; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 2; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #333; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="600" y="30" class="title">用户收藏管理模块 ER图</text>
  
  <!-- 用户实体 -->
  <rect x="50" y="200" width="120" height="80" class="entity" rx="5"/>
  <text x="110" y="235" class="text">用户</text>
  <text x="110" y="255" class="text" font-size="10">(sys_user)</text>
  
  <!-- 用户属性 -->
  <ellipse cx="30" cy="150" rx="25" ry="15" class="key-attribute"/>
  <text x="30" y="150" class="text" font-size="10">user_id</text>
  
  <ellipse cx="110" cy="130" rx="30" ry="15" class="attribute"/>
  <text x="110" y="130" class="text" font-size="10">user_name</text>
  
  <ellipse cx="190" cy="150" rx="25" ry="15" class="attribute"/>
  <text x="190" y="150" class="text" font-size="10">nick_name</text>
  
  <ellipse cx="30" cy="320" rx="25" ry="15" class="attribute"/>
  <text x="30" y="320" class="text" font-size="10">email</text>
  
  <ellipse cx="110" cy="340" rx="30" ry="15" class="attribute"/>
  <text x="110" y="340" class="text" font-size="10">phone</text>
  
  <ellipse cx="190" cy="320" rx="25" ry="15" class="attribute"/>
  <text x="190" y="320" class="text" font-size="10">status</text>
  
  <!-- 用户收藏实体 -->
  <rect x="500" y="300" width="200" height="100" class="entity" rx="5"/>
  <text x="600" y="340" class="text">用户收藏</text>
  <text x="600" y="360" class="text" font-size="10">(tourism_user_collection)</text>
  
  <!-- 收藏属性 -->
  <ellipse cx="430" cy="250" rx="20" ry="15" class="key-attribute"/>
  <text x="430" y="250" class="text" font-size="10">id</text>
  
  <ellipse cx="500" cy="230" rx="30" ry="15" class="attribute"/>
  <text x="500" y="230" class="text" font-size="10">user_id</text>
  
  <ellipse cx="600" cy="210" rx="35" ry="15" class="attribute"/>
  <text x="600" y="210" class="text" font-size="10">target_type</text>
  
  <ellipse cx="700" cy="230" rx="30" ry="15" class="attribute"/>
  <text x="700" y="230" class="text" font-size="10">target_id</text>
  
  <ellipse cx="770" cy="250" rx="35" ry="15" class="attribute"/>
  <text x="770" y="250" class="text" font-size="10">target_name</text>
  
  <ellipse cx="430" cy="450" rx="35" ry="15" class="attribute"/>
  <text x="430" y="450" class="text" font-size="10">create_time</text>
  
  <ellipse cx="530" cy="470" rx="30" ry="15" class="attribute"/>
  <text x="530" y="470" class="text" font-size="10">create_by</text>
  
  <ellipse cx="630" cy="470" rx="30" ry="15" class="attribute"/>
  <text x="630" y="470" class="text" font-size="10">update_time</text>
  
  <ellipse cx="730" cy="450" rx="30" ry="15" class="attribute"/>
  <text x="730" y="450" class="text" font-size="10">update_by</text>
  
  <!-- A级景区实体 -->
  <rect x="900" y="80" width="150" height="80" class="entity" rx="5"/>
  <text x="975" y="115" class="text">A级景区</text>
  <text x="975" y="135" class="text" font-size="10">(tourism_scenic_spot)</text>
  
  <!-- 景区属性 -->
  <ellipse cx="880" cy="50" rx="20" ry="15" class="key-attribute"/>
  <text x="880" y="50" class="text" font-size="10">id</text>
  
  <ellipse cx="975" cy="30" rx="25" ry="15" class="attribute"/>
  <text x="975" y="30" class="text" font-size="10">name</text>
  
  <ellipse cx="1070" cy="50" rx="25" ry="15" class="attribute"/>
  <text x="1070" y="50" class="text" font-size="10">level</text>
  
  <ellipse cx="880" cy="200" rx="30" ry="15" class="attribute"/>
  <text x="880" y="200" class="text" font-size="10">address</text>
  
  <ellipse cx="975" cy="220" rx="35" ry="15" class="attribute"/>
  <text x="975" y="220" class="text" font-size="10">ticket_price</text>
  
  <ellipse cx="1070" cy="200" rx="40" ry="15" class="attribute"/>
  <text x="1070" y="200" class="text" font-size="10">collection_count</text>
  
  <!-- 场馆实体 -->
  <rect x="900" y="300" width="150" height="80" class="entity" rx="5"/>
  <text x="975" y="335" class="text">场馆</text>
  <text x="975" y="355" class="text" font-size="10">(tourism_venue)</text>
  
  <!-- 场馆属性 -->
  <ellipse cx="880" cy="270" rx="20" ry="15" class="key-attribute"/>
  <text x="880" y="270" class="text" font-size="10">id</text>
  
  <ellipse cx="975" cy="250" rx="25" ry="15" class="attribute"/>
  <text x="975" y="250" class="text" font-size="10">name</text>
  
  <ellipse cx="1070" cy="270" rx="30" ry="15" class="attribute"/>
  <text x="1070" y="270" class="text" font-size="10">category</text>
  
  <ellipse cx="880" cy="420" rx="30" ry="15" class="attribute"/>
  <text x="880" y="420" class="text" font-size="10">address</text>
  
  <ellipse cx="975" cy="440" rx="30" ry="15" class="attribute"/>
  <text x="975" y="440" class="text" font-size="10">capacity</text>
  
  <ellipse cx="1070" cy="420" rx="40" ry="15" class="attribute"/>
  <text x="1070" y="420" class="text" font-size="10">collection_count</text>
  
  <!-- 特色活动实体 -->
  <rect x="900" y="520" width="150" height="80" class="entity" rx="5"/>
  <text x="975" y="555" class="text">特色活动</text>
  <text x="975" y="575" class="text" font-size="10">(tourism_activity)</text>
  
  <!-- 活动属性 -->
  <ellipse cx="880" cy="490" rx="20" ry="15" class="key-attribute"/>
  <text x="880" y="490" class="text" font-size="10">id</text>
  
  <ellipse cx="975" cy="470" rx="25" ry="15" class="attribute"/>
  <text x="975" y="470" class="text" font-size="10">name</text>
  
  <ellipse cx="1070" cy="490" rx="30" ry="15" class="attribute"/>
  <text x="1070" y="490" class="text" font-size="10">category</text>
  
  <ellipse cx="880" cy="640" rx="30" ry="15" class="attribute"/>
  <text x="880" y="640" class="text" font-size="10">organizer</text>
  
  <ellipse cx="975" cy="660" rx="35" ry="15" class="attribute"/>
  <text x="975" y="660" class="text" font-size="10">start_time</text>
  
  <ellipse cx="1070" cy="640" rx="40" ry="15" class="attribute"/>
  <text x="1070" y="640" class="text" font-size="10">collection_count</text>
  
  <!-- 关系 -->
  <!-- 用户收藏关系 -->
  <polygon points="170,240 430,320 410,310 430,330" class="relationship"/>
  <text x="300" y="280" class="text">收藏</text>
  
  <!-- 收藏景区关系 -->
  <polygon points="700,350 900,120 880,110 900,130" class="relationship"/>
  <text x="800" y="235" class="text">收藏景区</text>
  
  <!-- 收藏场馆关系 -->
  <polygon points="700,350 900,340 880,330 900,350" class="relationship"/>
  <text x="800" y="345" class="text">收藏场馆</text>
  
  <!-- 收藏活动关系 -->
  <polygon points="700,350 900,560 880,550 900,570" class="relationship"/>
  <text x="800" y="455" class="text">收藏活动</text>
  
  <!-- 连接线 -->
  <!-- 用户到收藏关系 -->
  <line x1="170" y1="240" x2="300" y2="280" class="line"/>
  
  <!-- 收藏关系到收藏实体 -->
  <line x1="300" y1="280" x2="500" y2="320" class="line"/>
  
  <!-- 收藏实体到各个被收藏实体 -->
  <line x1="700" y1="350" x2="800" y2="235" class="line"/>
  <line x1="800" y1="235" x2="900" y2="120" class="line"/>
  
  <line x1="700" y1="350" x2="800" y2="345" class="line"/>
  <line x1="800" y1="345" x2="900" y2="340" class="line"/>
  
  <line x1="700" y1="350" x2="800" y2="455" class="line"/>
  <line x1="800" y1="455" x2="900" y2="560" class="line"/>
  
  <!-- 属性连接线（简化显示主要连接） -->
  <!-- 用户属性 -->
  <line x1="55" y1="150" x2="80" y2="200" class="line"/>
  <line x1="110" y1="145" x2="110" y2="200" class="line"/>
  <line x1="165" y1="150" x2="140" y2="200" class="line"/>
  <line x1="55" y1="320" x2="80" y2="280" class="line"/>
  <line x1="110" y1="325" x2="110" y2="280" class="line"/>
  <line x1="165" y1="320" x2="140" y2="280" class="line"/>
  
  <!-- 收藏实体属性 -->
  <line x1="450" y1="250" x2="500" y2="300" class="line"/>
  <line x1="500" y1="245" x2="530" y2="300" class="line"/>
  <line x1="600" y1="225" x2="600" y2="300" class="line"/>
  <line x1="700" y1="245" x2="670" y2="300" class="line"/>
  <line x1="750" y1="250" x2="700" y2="300" class="line"/>
  
  <!-- 景区属性 -->
  <line x1="900" y1="50" x2="930" y2="80" class="line"/>
  <line x1="975" y1="45" x2="975" y2="80" class="line"/>
  <line x1="1045" y1="50" x2="1020" y2="80" class="line"/>
  
  <!-- 场馆属性 -->
  <line x1="900" y1="270" x2="930" y2="300" class="line"/>
  <line x1="975" y1="265" x2="975" y2="300" class="line"/>
  <line x1="1045" y1="270" x2="1020" y2="300" class="line"/>
  
  <!-- 活动属性 -->
  <line x1="900" y1="490" x2="930" y2="520" class="line"/>
  <line x1="975" y1="485" x2="975" y2="520" class="line"/>
  <line x1="1045" y1="490" x2="1020" y2="520" class="line"/>
  
  <!-- 基数标注 -->
  <text x="180" y="250" class="text" font-size="10">N</text>
  <text x="490" y="330" class="text" font-size="10">N</text>
  <text x="710" y="360" class="text" font-size="10">N</text>
  <text x="890" y="130" class="text" font-size="10">N</text>
  <text x="710" y="360" class="text" font-size="10">N</text>
  <text x="890" y="350" class="text" font-size="10">N</text>
  <text x="710" y="360" class="text" font-size="10">N</text>
  <text x="890" y="570" class="text" font-size="10">N</text>
  
  <!-- 收藏类型说明 -->
  <rect x="250" y="500" width="300" height="120" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="400" y="520" class="text" font-weight="bold">收藏类型说明：</text>
  <text x="260" y="540" class="text" font-size="11">target_type 字段值：</text>
  <text x="260" y="560" class="text" font-size="11">• 'scenic_spot' - 收藏A级景区</text>
  <text x="260" y="580" class="text" font-size="11">• 'venue' - 收藏场馆</text>
  <text x="260" y="600" class="text" font-size="11">• 'activity' - 收藏特色活动</text>
  
  <!-- 图例 -->
  <rect x="50" y="700" width="1100" height="60" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="715" class="text" font-weight="bold">图例：</text>
  
  <rect x="70" y="725" width="40" height="20" class="entity" rx="2"/>
  <text x="90" y="735" class="text" font-size="10">实体</text>
  
  <ellipse cx="150" cy="735" rx="20" ry="10" class="key-attribute"/>
  <text x="150" y="735" class="text" font-size="9">主键属性</text>
  
  <ellipse cx="230" cy="735" rx="20" ry="10" class="attribute"/>
  <text x="230" y="735" class="text" font-size="9">普通属性</text>
  
  <polygon points="300,725 320,735 300,745 280,735" class="relationship"/>
  <text x="300" y="735" class="text" font-size="9">关系</text>
  
  <text x="400" y="735" class="text" font-size="10">说明：用户可以收藏多个景区、场馆和活动；通过target_type字段区分收藏类型</text>
</svg>