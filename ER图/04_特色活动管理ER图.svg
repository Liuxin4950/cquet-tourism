<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e8f4fd; stroke: #1976d2; stroke-width: 2; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 1.5; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 2; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 2; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #333; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="600" y="30" class="title">特色活动管理模块 ER图</text>
  
  <!-- 场馆实体 -->
  <rect x="50" y="100" width="120" height="60" class="entity" rx="5"/>
  <text x="110" y="125" class="text">场馆</text>
  <text x="110" y="140" class="text" font-size="10">(tourism_venue)</text>
  
  <!-- 场馆属性 -->
  <ellipse cx="30" cy="80" rx="20" ry="15" class="key-attribute"/>
  <text x="30" y="80" class="text" font-size="10">id</text>
  
  <ellipse cx="110" cy="60" rx="25" ry="15" class="attribute"/>
  <text x="110" y="60" class="text" font-size="10">name</text>
  
  <ellipse cx="190" cy="80" rx="30" ry="15" class="attribute"/>
  <text x="190" y="80" class="text" font-size="10">category</text>
  
  <!-- 特色活动实体 -->
  <rect x="400" y="250" width="200" height="100" class="entity" rx="5"/>
  <text x="500" y="290" class="text">特色活动</text>
  <text x="500" y="310" class="text" font-size="10">(tourism_activity)</text>
  
  <!-- 活动主要属性 -->
  <ellipse cx="330" cy="200" rx="20" ry="15" class="key-attribute"/>
  <text x="330" y="200" class="text" font-size="10">id</text>
  
  <ellipse cx="400" cy="180" rx="30" ry="15" class="attribute"/>
  <text x="400" y="180" class="text" font-size="10">name</text>
  
  <ellipse cx="500" cy="160" rx="30" ry="15" class="attribute"/>
  <text x="500" y="160" class="text" font-size="10">category</text>
  
  <ellipse cx="600" cy="180" rx="40" ry="15" class="attribute"/>
  <text x="600" y="180" class="text" font-size="10">cover_image</text>
  
  <ellipse cx="670" cy="200" rx="30" ry="15" class="attribute"/>
  <text x="670" y="200" class="text" font-size="10">organizer</text>
  
  <!-- 时间相关属性 -->
  <ellipse cx="250" cy="250" rx="35" ry="15" class="attribute"/>
  <text x="250" y="250" class="text" font-size="10">start_time</text>
  
  <ellipse cx="250" cy="290" rx="30" ry="15" class="attribute"/>
  <text x="250" y="290" class="text" font-size="10">end_time</text>
  
  <ellipse cx="250" cy="330" rx="45" ry="15" class="attribute"/>
  <text x="250" y="330" class="text" font-size="10">registration_start</text>
  
  <ellipse cx="250" cy="370" rx="40" ry="15" class="attribute"/>
  <text x="250" y="370" class="text" font-size="10">registration_end</text>
  
  <!-- 参与相关属性 -->
  <ellipse cx="720" cy="250" rx="45" ry="15" class="attribute"/>
  <text x="720" y="250" class="text" font-size="10">max_participants</text>
  
  <ellipse cx="720" cy="290" rx="50" ry="15" class="attribute"/>
  <text x="720" y="290" class="text" font-size="10">current_participants</text>
  
  <ellipse cx="720" cy="330" rx="25" ry="15" class="attribute"/>
  <text x="720" y="330" class="text" font-size="10">fee</text>
  
  <!-- 内容相关属性 -->
  <ellipse cx="400" cy="400" rx="35" ry="15" class="attribute"/>
  <text x="400" y="400" class="text" font-size="10">description</text>
  
  <ellipse cx="500" cy="400" rx="35" ry="15" class="attribute"/>
  <text x="500" y="400" class="text" font-size="10">requirements</text>
  
  <ellipse cx="600" cy="400" rx="40" ry="15" class="attribute"/>
  <text x="600" y="400" class="text" font-size="10">contact_phone</text>
  
  <!-- 统计相关属性 -->
  <ellipse cx="330" cy="420" rx="40" ry="15" class="attribute"/>
  <text x="330" y="420" class="text" font-size="10">collection_count</text>
  
  <ellipse cx="450" cy="420" rx="35" ry="15" class="attribute"/>
  <text x="450" y="420" class="text" font-size="10">view_count</text>
  
  <ellipse cx="570" cy="420" rx="40" ry="15" class="attribute"/>
  <text x="570" y="420" class="text" font-size="10">comment_count</text>
  
  <!-- 审核相关属性 -->
  <ellipse cx="670" cy="420" rx="35" ry="15" class="attribute"/>
  <text x="670" y="420" class="text" font-size="10">audit_status</text>
  
  <ellipse cx="330" cy="450" rx="35" ry="15" class="attribute"/>
  <text x="330" y="450" class="text" font-size="10">audit_reason</text>
  
  <ellipse cx="450" cy="450" rx="30" ry="15" class="attribute"/>
  <text x="450" y="450" class="text" font-size="10">auditor</text>
  
  <ellipse cx="570" cy="450" rx="35" ry="15" class="attribute"/>
  <text x="570" y="450" class="text" font-size="10">audit_time</text>
  
  <!-- 用户实体 -->
  <rect x="900" y="100" width="120" height="60" class="entity" rx="5"/>
  <text x="960" y="130" class="text">用户</text>
  
  <!-- 用户属性 -->
  <ellipse cx="880" cy="80" rx="25" ry="15" class="key-attribute"/>
  <text x="880" y="80" class="text" font-size="10">user_id</text>
  
  <ellipse cx="960" cy="60" rx="30" ry="15" class="attribute"/>
  <text x="960" y="60" class="text" font-size="10">用户名</text>
  
  <ellipse cx="1040" cy="80" rx="25" ry="15" class="attribute"/>
  <text x="1040" y="80" class="text" font-size="10">昵称</text>
  
  <!-- 活动报名实体 -->
  <rect x="750" y="450" width="180" height="80" class="entity" rx="5"/>
  <text x="840" y="485" class="text">活动报名</text>
  <text x="840" y="505" class="text" font-size="10">(tourism_activity_application)</text>
  
  <!-- 报名属性 -->
  <ellipse cx="680" cy="400" rx="20" ry="15" class="key-attribute"/>
  <text x="680" y="400" class="text" font-size="10">id</text>
  
  <ellipse cx="750" cy="380" rx="40" ry="15" class="attribute"/>
  <text x="750" y="380" class="text" font-size="10">applicant_name</text>
  
  <ellipse cx="850" cy="380" rx="40" ry="15" class="attribute"/>
  <text x="850" y="380" class="text" font-size="10">applicant_phone</text>
  
  <ellipse cx="950" cy="400" rx="45" ry="15" class="attribute"/>
  <text x="950" y="400" class="text" font-size="10">application_reason</text>
  
  <ellipse cx="680" cy="550" rx="25" ry="15" class="attribute"/>
  <text x="680" y="550" class="text" font-size="10">status</text>
  
  <ellipse cx="750" cy="570" rx="35" ry="15" class="attribute"/>
  <text x="750" y="570" class="text" font-size="10">audit_reason</text>
  
  <ellipse cx="850" cy="570" rx="30" ry="15" class="attribute"/>
  <text x="850" y="570" class="text" font-size="10">auditor</text>
  
  <ellipse cx="950" cy="550" rx="35" ry="15" class="attribute"/>
  <text x="950" y="550" class="text" font-size="10">audit_time</text>
  
  <!-- 活动评论实体 -->
  <rect x="400" y="650" width="180" height="80" class="entity" rx="5"/>
  <text x="490" y="685" class="text">活动评论</text>
  <text x="490" y="705" class="text" font-size="10">(tourism_activity_comment)</text>
  
  <!-- 评论属性 -->
  <ellipse cx="330" cy="600" rx="20" ry="15" class="key-attribute"/>
  <text x="330" y="600" class="text" font-size="10">id</text>
  
  <ellipse cx="400" cy="580" rx="30" ry="15" class="attribute"/>
  <text x="400" y="580" class="text" font-size="10">user_name</text>
  
  <ellipse cx="500" cy="580" rx="30" ry="15" class="attribute"/>
  <text x="500" y="580" class="text" font-size="10">content</text>
  
  <ellipse cx="600" cy="600" rx="30" ry="15" class="attribute"/>
  <text x="600" y="600" class="text" font-size="10">parent_id</text>
  
  <ellipse cx="330" cy="780" rx="25" ry="15" class="attribute"/>
  <text x="330" y="780" class="text" font-size="10">status</text>
  
  <ellipse cx="450" cy="780" rx="35" ry="15" class="attribute"/>
  <text x="450" y="780" class="text" font-size="10">create_time</text>
  
  <ellipse cx="570" cy="780" rx="30" ry="15" class="attribute"/>
  <text x="570" y="780" class="text" font-size="10">create_by</text>
  
  <!-- 关系 -->
  <!-- 场馆举办活动关系 -->
  <polygon points="170,130 330,200 310,190 330,210" class="relationship"/>
  <text x="250" y="165" class="text">举办</text>
  
  <!-- 用户报名活动关系 -->
  <polygon points="900,130 750,450 730,440 750,460" class="relationship"/>
  <text x="825" y="290" class="text">报名</text>
  
  <!-- 活动被报名关系 -->
  <polygon points="600,300 750,450 730,440 750,460" class="relationship"/>
  <text x="675" y="375" class="text">被报名</text>
  
  <!-- 用户评论活动关系 -->
  <polygon points="900,160 400,650 380,640 400,660" class="relationship"/>
  <text x="650" y="405" class="text">评论</text>
  
  <!-- 活动被评论关系 -->
  <polygon points="500,350 490,650 470,640 490,660" class="relationship"/>
  <text x="495" y="500" class="text">被评论</text>
  
  <!-- 连接线 -->
  <!-- 场馆到举办关系 -->
  <line x1="170" y1="130" x2="250" y2="165" class="line"/>
  
  <!-- 举办关系到活动 -->
  <line x1="250" y1="165" x2="400" y2="250" class="line"/>
  
  <!-- 用户到报名关系 -->
  <line x1="900" y1="130" x2="825" y2="290" class="line"/>
  
  <!-- 报名关系到报名实体 -->
  <line x1="825" y1="290" x2="750" y2="450" class="line"/>
  
  <!-- 活动到被报名关系 -->
  <line x1="600" y1="300" x2="675" y2="375" class="line"/>
  
  <!-- 被报名关系到报名实体 -->
  <line x1="675" y1="375" x2="750" y2="450" class="line"/>
  
  <!-- 用户到评论关系 -->
  <line x1="900" y1="160" x2="650" y2="405" class="line"/>
  
  <!-- 评论关系到评论实体 -->
  <line x1="650" y1="405" x2="400" y2="650" class="line"/>
  
  <!-- 活动到被评论关系 -->
  <line x1="500" y1="350" x2="495" y2="500" class="line"/>
  
  <!-- 被评论关系到评论实体 -->
  <line x1="495" y1="500" x2="490" y2="650" class="line"/>
  
  <!-- 属性连接线（简化显示主要连接） -->
  <!-- 场馆属性 -->
  <line x1="50" y1="80" x2="80" y2="110" class="line"/>
  <line x1="110" y1="75" x2="110" y2="100" class="line"/>
  <line x1="165" y1="80" x2="140" y2="110" class="line"/>
  
  <!-- 活动主要属性 -->
  <line x1="350" y1="200" x2="400" y2="250" class="line"/>
  <line x1="400" y1="195" x2="430" y2="250" class="line"/>
  <line x1="500" y1="175" x2="500" y2="250" class="line"/>
  <line x1="600" y1="195" x2="570" y2="250" class="line"/>
  <line x1="650" y1="200" x2="600" y2="250" class="line"/>
  
  <!-- 用户属性 -->
  <line x1="905" y1="80" x2="930" y2="110" class="line"/>
  <line x1="960" y1="75" x2="960" y2="100" class="line"/>
  <line x1="1015" y1="80" x2="990" y2="110" class="line"/>
  
  <!-- 基数标注 -->
  <text x="180" y="140" class="text" font-size="10">1</text>
  <text x="380" y="240" class="text" font-size="10">N</text>
  <text x="890" y="140" class="text" font-size="10">N</text>
  <text x="740" y="460" class="text" font-size="10">N</text>
  <text x="610" y="310" class="text" font-size="10">1</text>
  <text x="740" y="460" class="text" font-size="10">N</text>
  <text x="890" y="170" class="text" font-size="10">N</text>
  <text x="390" y="660" class="text" font-size="10">N</text>
  <text x="510" y="360" class="text" font-size="10">1</text>
  <text x="480" y="660" class="text" font-size="10">N</text>
  
  <!-- 图例 -->
  <rect x="50" y="820" width="1100" height="60" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="835" class="text" font-weight="bold">图例：</text>
  
  <rect x="70" y="845" width="40" height="20" class="entity" rx="2"/>
  <text x="90" y="855" class="text" font-size="10">实体</text>
  
  <ellipse cx="150" cy="855" rx="20" ry="10" class="key-attribute"/>
  <text x="150" y="855" class="text" font-size="9">主键属性</text>
  
  <ellipse cx="230" cy="855" rx="20" ry="10" class="attribute"/>
  <text x="230" y="855" class="text" font-size="9">普通属性</text>
  
  <polygon points="300,845 320,855 300,865 280,855" class="relationship"/>
  <text x="300" y="855" class="text" font-size="9">关系</text>
  
  <text x="400" y="855" class="text" font-size="10">说明：场馆举办多个活动；用户可以报名和评论多个活动；活动可以被多个用户报名和评论</text>
</svg>