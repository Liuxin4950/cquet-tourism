<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e3f2fd; stroke: #1976d2; stroke-width: 3; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 3; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 3; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 13px; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #1976d2; }
      .subtitle { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 11px; text-anchor: middle; dominant-baseline: middle; fill: #666; }
      .line { stroke: #333; stroke-width: 2; fill: none; }
      .foreign-key { stroke: #d32f2f; stroke-width: 3; stroke-dasharray: 5,5; }
      .cardinality { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #d32f2f; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="700" y="30" class="title">特色活动管理模块 E-R图</text>
  
  <!-- 场馆实体 -->
  <rect x="100" y="120" width="160" height="80" class="entity" rx="8"/>
  <text x="180" y="150" class="text" font-weight="bold">场馆信息</text>
  <text x="180" y="170" class="subtitle">(tourism_venue)</text>
  
  <!-- 特色活动实体 -->
  <rect x="500" y="300" width="200" height="120" class="entity" rx="8"/>
  <text x="600" y="345" class="text" font-weight="bold">特色活动</text>
  <text x="600" y="365" class="subtitle">(tourism_activity)</text>
  
  <!-- 活动评论实体 -->
  <rect x="900" y="300" width="180" height="100" class="entity" rx="8"/>
  <text x="990" y="340" class="text" font-weight="bold">活动评论</text>
  <text x="990" y="360" class="subtitle">(tourism_activity_comment)</text>
  
  <!-- 系统用户实体 -->
  <rect x="1200" y="120" width="160" height="80" class="entity" rx="8"/>
  <text x="1280" y="150" class="text" font-weight="bold">系统用户</text>
  <text x="1280" y="170" class="subtitle">(sys_user)</text>
  
  <!-- 用户收藏实体 -->
  <rect x="900" y="500" width="180" height="80" class="entity" rx="8"/>
  <text x="990" y="535" class="text" font-weight="bold">用户收藏</text>
  <text x="990" y="555" class="subtitle">(tourism_user_collection)</text>
  
  <!-- 活动属性 -->
  <ellipse cx="430" cy="320" rx="25" ry="18" class="key-attribute"/>
  <text x="430" y="320" class="text" font-size="11">id (PK)</text>
  
  <ellipse cx="550" cy="250" rx="30" ry="18" class="attribute"/>
  <text x="550" y="250" class="text" font-size="11">name</text>
  
  <ellipse cx="650" cy="250" rx="30" ry="18" class="attribute"/>
  <text x="650" y="250" class="text" font-size="11">category</text>
  
  <ellipse cx="750" cy="320" rx="30" ry="18" class="attribute"/>
  <text x="750" y="320" class="text" font-size="11">organizer</text>
  
  <ellipse cx="430" cy="470" rx="35" ry="18" class="attribute"/>
  <text x="430" y="470" class="text" font-size="11">start_time</text>
  
  <ellipse cx="550" cy="470" rx="30" ry="18" class="attribute"/>
  <text x="550" y="470" class="text" font-size="11">end_time</text>
  
  <ellipse cx="650" cy="470" rx="45" ry="18" class="attribute"/>
  <text x="650" y="470" class="text" font-size="11">max_participants</text>
  
  <ellipse cx="750" cy="470" rx="25" ry="18" class="attribute"/>
  <text x="750" y="470" class="text" font-size="11">fee</text>
  
  <!-- 外键属性 -->
  <ellipse cx="430" cy="380" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="430" y="380" class="text" font-size="11" fill="#d32f2f">venue_id (FK)</text>
  
  <ellipse cx="750" cy="380" rx="35" ry="18" class="attribute"/>
  <text x="750" y="380" class="text" font-size="11">audit_status</text>
  
  <ellipse cx="600" y="530" rx="30" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="600" y="530" class="text" font-size="11" fill="#d32f2f">auditor</text>
  
  <!-- 评论属性 -->
  <ellipse cx="830" cy="320" rx="25" ry="18" class="key-attribute"/>
  <text x="830" y="320" class="text" font-size="11">id (PK)</text>
  
  <ellipse cx="1130" cy="320" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="1130" y="320" class="text" font-size="11" fill="#d32f2f">activity_id (FK)</text>
  
  <ellipse cx="990" cy="250" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="990" y="250" class="text" font-size="11" fill="#d32f2f">user_id (FK)</text>
  
  <ellipse cx="990" y="420" rx="30" ry="18" class="attribute"/>
  <text x="990" y="420" class="text" font-size="11">content</text>
  
  <ellipse cx="830" cy="380" rx="30" ry="18" class="attribute"/>
  <text x="830" y="380" class="text" font-size="11">parent_id</text>
  
  <ellipse cx="1130" cy="380" rx="35" ry="18" class="attribute"/>
  <text x="1130" y="380" class="text" font-size="11">create_time</text>
  
  <!-- 收藏属性 -->
  <ellipse cx="830" cy="520" rx="25" ry="18" class="key-attribute"/>
  <text x="830" y="520" class="text" font-size="11">id (PK)</text>
  
  <ellipse cx="990" cy="460" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="990" y="460" class="text" font-size="11" fill="#d32f2f">user_id (FK)</text>
  
  <ellipse cx="1130" cy="520" rx="35" ry="18" class="attribute"/>
  <text x="1130" y="520" class="text" font-size="11">target_type</text>
  
  <ellipse cx="990" cy="620" rx="35" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="990" y="620" class="text" font-size="11" fill="#d32f2f">target_id (FK)</text>
  
  <!-- 关系 -->
  <!-- 举办关系 -->
  <polygon points="300,200 350,225 300,250 250,225" class="relationship"/>
  <text x="300" y="225" class="text" font-weight="bold">举办</text>
  
  <!-- 评论关系 -->
  <polygon points="750,350 800,375 750,400 700,375" class="relationship"/>
  <text x="750" y="375" class="text" font-weight="bold">产生</text>
  
  <!-- 用户评论关系 -->
  <polygon points="1150,250 1200,275 1150,300 1100,275" class="relationship"/>
  <text x="1150" y="275" class="text" font-weight="bold">发表</text>
  
  <!-- 收藏关系 -->
  <polygon points="750,450 800,475 750,500 700,475" class="relationship"/>
  <text x="750" y="475" class="text" font-weight="bold">被收藏</text>
  
  <!-- 用户收藏关系 -->
  <polygon points="1150,450 1200,475 1150,500 1100,475" class="relationship"/>
  <text x="1150" y="475" class="text" font-weight="bold">收藏</text>
  
  <!-- 审核关系 -->
  <polygon points="850,200 900,225 850,250 800,225" class="relationship"/>
  <text x="850" y="225" class="text" font-weight="bold">审核</text>
  
  <!-- 连接线 -->
  <!-- 场馆举办活动 -->
  <line x1="260" y1="160" x2="250" y2="225" class="line"/>
  <line x1="350" y1="225" x2="500" y2="360" class="line"/>
  
  <!-- 活动产生评论 -->
  <line x1="700" y1="360" x2="700" y2="375" class="line"/>
  <line x1="800" y1="375" x2="900" y2="350" class="line"/>
  
  <!-- 用户发表评论 -->
  <line x1="1200" y1="160" x2="1200" y2="275" class="line"/>
  <line x1="1100" y1="275" x2="1080" y2="340" class="line"/>
  
  <!-- 活动被收藏 -->
  <line x1="700" y1="420" x2="700" y2="475" class="line"/>
  <line x1="800" y1="475" x2="900" y2="540" class="line"/>
  
  <!-- 用户收藏 -->
  <line x1="1200" y1="160" x2="1200" y2="475" class="line"/>
  <line x1="1100" y1="475" x2="1080" y2="540" class="line"/>
  
  <!-- 用户审核活动 -->
  <line x1="1200" y1="160" x2="900" y2="225" class="line"/>
  <line x1="800" y1="225" x2="700" y2="300" class="line"/>
  
  <!-- 外键连接线 -->
  <line x1="260" y1="180" x2="430" y2="380" class="foreign-key"/>
  <line x1="700" y1="360" x2="1130" y2="320" class="foreign-key"/>
  <line x1="1280" y1="200" x2="990" y2="250" class="foreign-key"/>
  <line x1="1280" y1="200" x2="600" y2="530" class="foreign-key"/>
  <line x1="1280" y1="200" x2="990" y2="460" class="foreign-key"/>
  <line x1="700" y1="360" x2="990" y2="620" class="foreign-key"/>
  
  <!-- 基数标注 -->
  <text x="270" y="170" class="cardinality">1</text>
  <text x="480" y="340" class="cardinality">N</text>
  <text x="720" y="340" class="cardinality">1</text>
  <text x="880" y="340" class="cardinality">N</text>
  <text x="1220" y="170" class="cardinality">N</text>
  <text x="1060" y="320" class="cardinality">1</text>
  <text x="720" y="400" class="cardinality">1</text>
  <text x="880" y="520" class="cardinality">N</text>
  <text x="1220" y="180" class="cardinality">N</text>
  <text x="1060" y="520" class="cardinality">1</text>
  <text x="1220" y="190" class="cardinality">1</text>
  <text x="680" y="320" class="cardinality">N</text>
  
  <!-- 属性连接线 -->
  <line x1="455" y1="320" x2="500" y2="360" class="line"/>
  <line x1="550" y1="268" x2="550" y2="300" class="line"/>
  <line x1="650" y1="268" x2="650" y2="300" class="line"/>
  <line x1="730" y1="330" x2="700" y2="340" class="line"/>
  <line x1="430" y1="452" x2="500" y2="420" class="line"/>
  <line x1="550" y1="452" x2="550" y2="420" class="line"/>
  <line x1="650" y1="452" x2="650" y2="420" class="line"/>
  <line x1="730" y1="460" x2="700" y2="400" class="line"/>
  <line x1="430" y1="362" x2="500" y2="340" class="line"/>
  <line x1="730" y1="370" x2="700" y2="380" class="line"/>
  <line x1="600" y1="512" x2="600" y2="420" class="line"/>
  
  <line x1="855" y1="320" x2="900" y2="340" class="line"/>
  <line x1="1110" y1="330" x2="1080" y2="340" class="line"/>
  <line x1="990" y1="268" x2="990" y2="300" class="line"/>
  <line x1="990" y1="402" x2="990" y2="400" class="line"/>
  <line x1="850" y1="370" x2="900" y2="360" class="line"/>
  <line x1="1110" y1="370" x2="1080" y2="360" class="line"/>
  
  <line x1="855" y1="520" x2="900" y2="540" class="line"/>
  <line x1="990" y1="478" x2="990" y2="500" class="line"/>
  <line x1="1110" y1="530" x2="1080" y2="540" class="line"/>
  <line x1="990" y1="602" x2="990" y2="580" class="line"/>
  
  <!-- 说明文字 -->
  <rect x="50" y="700" width="1300" height="140" fill="none" stroke="#ccc" stroke-width="2"/>
  <text x="700" y="725" class="text" font-weight="bold">关系说明</text>
  <text x="100" y="750" class="text" font-size="12">1. 场馆举办特色活动 (1:N) - venue_id外键关联</text>
  <text x="100" y="770" class="text" font-size="12">2. 系统用户审核活动 (1:N) - auditor字段关联用户名</text>
  <text x="100" y="790" class="text" font-size="12">3. 活动产生评论 (1:N) - activity_id外键关联</text>
  <text x="100" y="810" class="text" font-size="12">4. 用户发表评论 (N:1) - user_id外键关联</text>
  <text x="100" y="830" class="text" font-size="12">5. 用户收藏活动 (N:N) - 通过用户收藏表实现多对多关系</text>
</svg>
