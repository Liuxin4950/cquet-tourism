<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity { fill: #e3f2fd; stroke: #1976d2; stroke-width: 3; }
      .attribute { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .key-attribute { fill: #e8f5e8; stroke: #388e3c; stroke-width: 3; }
      .relationship { fill: #fce4ec; stroke: #c2185b; stroke-width: 3; }
      .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 13px; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .title { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #1976d2; }
      .subtitle { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 11px; text-anchor: middle; dominant-baseline: middle; fill: #666; }
      .line { stroke: #333; stroke-width: 2; fill: none; }
      .foreign-key { stroke: #d32f2f; stroke-width: 3; stroke-dasharray: 5,5; }
      .cardinality { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #d32f2f; }
    </style>
  </defs>
  
  <!-- 标题 -->
  <text x="700" y="30" class="title">特色活动申报管理模块 E-R图</text>
  
  <!-- 系统用户实体(申报者) -->
  <rect x="100" y="120" width="180" height="80" class="entity" rx="8"/>
  <text x="190" y="150" class="text" font-weight="bold">系统用户(申报者)</text>
  <text x="190" y="170" class="subtitle">(sys_user)</text>
  
  <!-- 特色活动实体 -->
  <rect x="500" y="120" width="200" height="100" class="entity" rx="8"/>
  <text x="600" y="160" class="text" font-weight="bold">特色活动</text>
  <text x="600" y="180" class="subtitle">(tourism_activity)</text>
  
  <!-- 活动申报实体 -->
  <rect x="400" y="350" width="220" height="120" class="entity" rx="8"/>
  <text x="510" y="395" class="text" font-weight="bold">活动申报</text>
  <text x="510" y="415" class="subtitle">(tourism_activity_application)</text>
  
  <!-- 系统用户实体(审核者) -->
  <rect x="1000" y="120" width="180" height="80" class="entity" rx="8"/>
  <text x="1090" y="150" class="text" font-weight="bold">系统用户(审核者)</text>
  <text x="1090" y="170" class="subtitle">(sys_user)</text>
  
  <!-- 申报属性 -->
  <ellipse cx="330" cy="370" rx="25" ry="18" class="key-attribute"/>
  <text x="330" y="370" class="text" font-size="11">id (PK)</text>
  
  <ellipse cx="450" cy="300" rx="40" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="450" y="300" class="text" font-size="11" fill="#d32f2f">activity_id (FK)</text>
  
  <ellipse cx="570" cy="300" rx="40" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="570" y="300" class="text" font-size="11" fill="#d32f2f">applicant_id (FK)</text>
  
  <ellipse cx="680" cy="370" rx="40" ry="18" class="attribute"/>
  <text x="680" y="370" class="text" font-size="11">applicant_name</text>
  
  <ellipse cx="330" cy="520" rx="40" ry="18" class="attribute"/>
  <text x="330" y="520" class="text" font-size="11">applicant_phone</text>
  
  <ellipse cx="450" cy="520" rx="45" ry="18" class="attribute"/>
  <text x="450" y="520" class="text" font-size="11">application_reason</text>
  
  <ellipse cx="570" cy="520" rx="25" ry="18" class="attribute"/>
  <text x="570" y="520" class="text" font-size="11">status</text>
  
  <ellipse cx="680" cy="520" rx="35" ry="18" class="attribute"/>
  <text x="680" y="520" class="text" font-size="11">audit_reason</text>
  
  <ellipse cx="680" cy="450" rx="30" ry="18" class="attribute" style="stroke: #d32f2f; stroke-dasharray: 3,3;"/>
  <text x="680" y="450" class="text" font-size="11" fill="#d32f2f">auditor (FK)</text>
  
  <ellipse cx="750" cy="370" rx="35" ry="18" class="attribute"/>
  <text x="750" y="370" class="text" font-size="11">audit_time</text>
  
  <!-- 活动属性 -->
  <ellipse cx="430" cy="140" rx="25" ry="18" class="key-attribute"/>
  <text x="430" y="140" class="text" font-size="11">id (PK)</text>
  
  <ellipse cx="550" cy="80" rx="30" ry="18" class="attribute"/>
  <text x="550" y="80" class="text" font-size="11">name</text>
  
  <ellipse cx="650" cy="80" rx="30" ry="18" class="attribute"/>
  <text x="650" y="80" class="text" font-size="11">category</text>
  
  <ellipse cx="750" cy="140" rx="30" ry="18" class="attribute"/>
  <text x="750" y="140" class="text" font-size="11">organizer</text>
  
  <ellipse cx="550" cy="260" rx="35" ry="18" class="attribute"/>
  <text x="550" y="260" class="text" font-size="11">start_time</text>
  
  <ellipse cx="650" cy="260" rx="30" ry="18" class="attribute"/>
  <text x="650" y="260" class="text" font-size="11">end_time</text>
  
  <!-- 用户属性(申报者) -->
  <ellipse cx="120" cy="80" rx="30" ry="18" class="key-attribute"/>
  <text x="120" y="80" class="text" font-size="11">user_id (PK)</text>
  
  <ellipse cx="240" cy="80" rx="35" ry="18" class="attribute"/>
  <text x="240" y="80" class="text" font-size="11">user_name</text>
  
  <ellipse cx="120" cy="240" rx="30" ry="18" class="attribute"/>
  <text x="120" y="240" class="text" font-size="11">nick_name</text>
  
  <ellipse cx="240" cy="240" rx="25" ry="18" class="attribute"/>
  <text x="240" y="240" class="text" font-size="11">email</text>
  
  <!-- 用户属性(审核者) -->
  <ellipse cx="1020" cy="80" rx="30" ry="18" class="key-attribute"/>
  <text x="1020" y="80" class="text" font-size="11">user_id (PK)</text>
  
  <ellipse cx="1140" cy="80" rx="35" ry="18" class="attribute"/>
  <text x="1140" y="80" class="text" font-size="11">user_name</text>
  
  <ellipse cx="1020" cy="240" rx="30" ry="18" class="attribute"/>
  <text x="1020" y="240" class="text" font-size="11">nick_name</text>
  
  <ellipse cx="1140" cy="240" rx="25" ry="18" class="attribute"/>
  <text x="1140" y="240" class="text" font-size="11">role</text>
  
  <!-- 关系 -->
  <!-- 申报关系 -->
  <polygon points="280,250 330,275 280,300 230,275" class="relationship"/>
  <text x="280" y="275" class="text" font-weight="bold">申报</text>
  
  <!-- 被申报关系 -->
  <polygon points="550,250 600,275 550,300 500,275" class="relationship"/>
  <text x="550" y="275" class="text" font-weight="bold">被申报</text>
  
  <!-- 审核关系 -->
  <polygon points="850,250 900,275 850,300 800,275" class="relationship"/>
  <text x="850" y="275" class="text" font-weight="bold">审核</text>
  
  <!-- 连接线 -->
  <!-- 用户申报 -->
  <line x1="190" y1="200" x2="230" y2="275" class="line"/>
  <line x1="330" y1="275" x2="400" y2="410" class="line"/>
  
  <!-- 活动被申报 -->
  <line x1="600" y1="220" x2="550" y2="250" class="line"/>
  <line x1="550" y1="300" x2="510" y2="350" class="line"/>
  
  <!-- 审核 -->
  <line x1="1000" y1="160" x2="900" y2="275" class="line"/>
  <line x1="800" y1="275" x2="620" y2="410" class="line"/>
  
  <!-- 外键连接线 -->
  <line x1="600" y1="220" x2="450" y2="300" class="foreign-key"/>
  <line x1="190" y1="200" x2="570" y2="300" class="foreign-key"/>
  <line x1="1090" y1="200" x2="680" y2="450" class="foreign-key"/>
  
  <!-- 基数标注 -->
  <text x="200" y="210" class="cardinality">N</text>
  <text x="380" y="390" class="cardinality">1</text>
  <text x="580" y="230" class="cardinality">1</text>
  <text x="490" y="330" class="cardinality">N</text>
  <text x="1080" y="210" class="cardinality">1</text>
  <text x="600" y="390" class="cardinality">N</text>
  
  <!-- 属性连接线 -->
  <line x1="355" y1="370" x2="400" y2="410" class="line"/>
  <line x1="450" y1="318" x2="450" y2="350" class="line"/>
  <line x1="570" y1="318" x2="570" y2="350" class="line"/>
  <line x1="660" y1="380" x2="620" y2="410" class="line"/>
  <line x1="330" y1="502" x2="400" y2="470" class="line"/>
  <line x1="450" y1="502" x2="450" y2="470" class="line"/>
  <line x1="570" y1="502" x2="570" y2="470" class="line"/>
  <line x1="680" y1="502" x2="600" y2="470" class="line"/>
  <line x1="680" y1="432" x2="620" y2="430" class="line"/>
  <line x1="730" y1="380" x2="620" y2="430" class="line"/>
  
  <line x1="455" y1="140" x2="500" y2="160" class="line"/>
  <line x1="550" y1="98" x2="550" y2="120" class="line"/>
  <line x1="650" y1="98" x2="650" y2="120" class="line"/>
  <line x1="730" y1="150" x2="700" y2="160" class="line"/>
  <line x1="550" y1="242" x2="550" y2="220" class="line"/>
  <line x1="650" y1="242" x2="650" y2="220" class="line"/>
  
  <line x1="140" y1="80" x2="150" y2="120" class="line"/>
  <line x1="220" y1="90" x2="210" y2="120" class="line"/>
  <line x1="140" y1="240" x2="150" y2="200" class="line"/>
  <line x1="220" y1="240" x2="210" y2="200" class="line"/>
  
  <line x1="1040" y1="80" x2="1050" y2="120" class="line"/>
  <line x1="1120" y1="90" x2="1110" y2="120" class="line"/>
  <line x1="1040" y1="240" x2="1050" y2="200" class="line"/>
  <line x1="1120" y1="240" x2="1110" y2="200" class="line"/>
  
  <!-- 说明文字 -->
  <rect x="50" y="600" width="1300" height="140" fill="none" stroke="#ccc" stroke-width="2"/>
  <text x="700" y="625" class="text" font-weight="bold">关系说明</text>
  <text x="100" y="650" class="text" font-size="12">1. 用户申报活动 (N:1) - applicant_id外键关联sys_user.user_id</text>
  <text x="100" y="670" class="text" font-size="12">2. 活动被申报 (1:N) - activity_id外键关联tourism_activity.id</text>
  <text x="100" y="690" class="text" font-size="12">3. 管理员审核申报 (1:N) - auditor字段关联sys_user.user_name</text>
  <text x="100" y="710" class="text" font-size="12">4. 申报状态：0待审核，1审核通过，2审核拒绝，3已取消</text>
  <text x="100" y="730" class="text" font-size="12">5. 一个用户可申报多个活动，一个活动可被多个用户申报，但每个用户对每个活动只能申报一次</text>
</svg>
